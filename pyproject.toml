[project]
name = "workoutdb"
version = "0.1.0"
description = "Local-first workout planning and logging system"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12",
  "pydantic>=2.6",
  "PyYAML>=6.0",
  "google-api-python-client>=2.128",
  "google-auth>=2.29",
  "google-auth-oauthlib>=1.2",
]

[project.scripts]
workoutdb = "workoutdb.cli:app"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100

[tool.setuptools]
packages = ["workoutdb"]
