openapi: 3.1.0
info:
  title: My API
  description: FastAPI application with contract-driven development
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Development server

paths:
  /articles:
    get:
      summary: List articles
      operationId: listArticles
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Article'

    post:
      summary: Create article
      operationId: createArticle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreate'
      responses:
        '201':
          description: Article created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '422':
          description: Validation error

  /articles/{article_id}:
    get:
      summary: Get article by ID
      operationId: getArticle
      parameters:
        - name: article_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          description: Article not found

    put:
      summary: Update article
      operationId: updateArticle
      parameters:
        - name: article_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleUpdate'
      responses:
        '200':
          description: Article updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '404':
          description: Article not found

    delete:
      summary: Delete article
      operationId: deleteArticle
      parameters:
        - name: article_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Article deleted
        '404':
          description: Article not found

components:
  schemas:
    Article:
      type: object
      required:
        - id
        - title
        - content
        - author_id
        - created_at
      properties:
        id:
          type: integer
          description: Unique identifier
        title:
          type: string
          description: Article title
          minLength: 1
          maxLength: 200
        content:
          type: string
          description: Article content
        author_id:
          type: integer
          description: ID of the author
        status:
          type: string
          enum: [draft, published]
          default: draft
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        id: 1
        title: "Getting Started with FastAPI"
        content: "FastAPI is a modern web framework..."
        author_id: 42
        status: "published"
        created_at: "2024-01-15T10:30:00Z"
        updated_at: "2024-01-15T10:30:00Z"

    ArticleCreate:
      type: object
      required:
        - title
        - content
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
        status:
          type: string
          enum: [draft, published]
          default: draft
      example:
        title: "Getting Started with FastAPI"
        content: "FastAPI is a modern web framework..."
        status: "draft"

    ArticleUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
        status:
          type: string
          enum: [draft, published]
      example:
        title: "Updated Title"
        content: "Updated content..."
        status: "published"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
