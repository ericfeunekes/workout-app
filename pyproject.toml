[project]
name = "workoutdb"
version = "0.1.0"
description = "Local-first workout planning and logging system"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12",
]

[project.scripts]
workoutdb = "workoutdb.cli:app"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100
