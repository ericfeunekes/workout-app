# Setmark Xcode project spec — generated by XcodeGen.
#
# Regenerate the .xcodeproj after any change here:
#     cd app && xcodegen generate
#
# See docs/architecture/swift-packages.md for the package graph and
# docs/architecture/boundaries.md for dependency rules this file enforces
# via SwiftPM's compile-time package graph.

name: WorkoutDB

options:
  bundleIdPrefix: com.ericfeunekes
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

# Project-wide build settings. Overrides per-target land under each target's
# `settings:` block.
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    # Leave empty — Eric fills in his Apple Developer Team ID in Xcode
    # (Signing & Capabilities panel) or via an xcconfig override. The
    # simulator build works without a team; device deploy requires one.
    DEVELOPMENT_TEAM: TVKR339CEB
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      GCC_PREPROCESSOR_DEFINITIONS: DEBUG=1
    Release:
      SWIFT_COMPILATION_MODE: wholemodule

# Local SwiftPM packages — everything under app/Packages/ plus the
# cross-stack schema package at ../schema.
packages:
  WorkoutCoreFoundation:
    path: Packages/Core/Foundation
  CoreDomain:
    path: Packages/Core/Domain
  CorePrescription:
    path: Packages/Core/Prescription
  CoreAutoreg:
    path: Packages/Core/Autoreg
  CoreSession:
    path: Packages/Core/Session
  CoreTelemetry:
    path: Packages/Core/Telemetry
  DesignSystem:
    path: Packages/DesignSystem
  Persistence:
    path: Packages/Persistence
  Sync:
    path: Packages/Sync
  HealthKitBridge:
    path: Packages/HealthKitBridge
  WatchBridge:
    path: Packages/WatchBridge
  WorkoutKitAdapter:
    path: Packages/WorkoutKitAdapter
  FeaturesToday:
    path: Packages/Features/Today
  FeaturesExecution:
    path: Packages/Features/Execution
  FeaturesFirstRun:
    path: Packages/Features/FirstRun
  FeaturesHistory:
    path: Packages/Features/History
  FeaturesSettings:
    path: Packages/Features/Settings
  FeaturesWatchFaces:
    path: Packages/Features/WatchFaces
  Shell:
    path: Packages/Shell
  WorkoutDBSchema:
    path: ../schema

targets:

  # -----------------------------------------------------------------------
  # Setmark — iOS app
  # -----------------------------------------------------------------------
  WorkoutDB:
    type: application
    platform: iOS
    sources:
      - path: WorkoutDB
        excludes:
          - Info.plist
    dependencies:
      # Core — pure domain and session logic
      - package: WorkoutCoreFoundation
      - package: CoreDomain
      - package: CorePrescription
      - package: CoreAutoreg
      - package: CoreSession
      # CoreTelemetry — structured event shape + emitter protocol. Shell
      # threads the persisted emitter into the view models at bootstrap.
      - package: CoreTelemetry
      # DesignSystem — tokens + primitives, used by feature screens
      - package: DesignSystem
      # Persistence — SwiftData stack, keychain, session store. The only
      # package allowed to import SwiftData (FF-13 enforces).
      - package: Persistence
      # Sync — the only package allowed to touch URLSession
      - package: Sync
      # HealthKitBridge — HR, cadence, body-weight queries. The only
      # package allowed to import HealthKit (FF-13 enforces).
      - package: HealthKitBridge
      # WatchBridge — iPhone ↔ Watch IPC. The only package allowed to
      # import WatchConnectivity (FF-13 enforces).
      - package: WatchBridge
      # WorkoutKitAdapter — target-side WorkoutKit plan construction,
      # scheduling/opening, and DEBUG proof probes. No visible export UI
      # calls this until real-device proof is recorded.
      - package: WorkoutKitAdapter
      # Companion watch app — embed so WatchConnectivity recognizes the
      # paired Watch app as this iOS app's counterpart in simulator/device
      # installs, not just as a separately-built target.
      - target: WorkoutDBWatch
      # Features — user-facing screens. Today is the first and proves
      # the Domain + DesignSystem + Persistence integration.
      - package: FeaturesToday
      # Execution — active set / rest / complete. The core-loop surface,
      # routed from Today's "start workout" action.
      - package: FeaturesExecution
      # FirstRun — the connection-string screen shown until a server URL +
      # bearer token land in TokenStore. Bypassed on every launch after.
      - package: FeaturesFirstRun
      # History — reverse-chrono list of completed workouts, session detail,
      # and per-exercise view. Read-side surface; no sync / session writes.
      # The WorkoutDB shell target imports it so the root tab bar can
      # present HistoryView directly; the actual tab composition lives in
      # Shell's RootTabView.
      - package: FeaturesHistory
      # Settings — server URL / change server / autoreg defaults / units /
      # reset local data. Sheet-presented from the app shell.
      - package: FeaturesSettings
      # Shell — launch-time composition: pull + cache + build view models.
      # Thin, sits above Features, the only place allowed to see multiple
      # Features packages at once (composition root).
      - package: Shell
      # Wire DTOs used only during package initialization; the app shell
      # itself should not import WorkoutDBSchema (FF-13 enforces).
    info:
      path: WorkoutDB/Info.plist
      properties:
        CFBundleDisplayName: Setmark
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            100.106.10.41:
              NSExceptionAllowsInsecureHTTPLoads: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - armv7
        NSHealthShareUsageDescription: "Reads heart rate and cadence during workouts for set logging."
        NSHealthUpdateUsageDescription: "Writes workout data to Apple Health so sessions appear in Fitness."
    entitlements:
      path: WorkoutDB/WorkoutDB.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericfeunekes.WorkoutDB
        TARGETED_DEVICE_FAMILY: "1,2"     # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.0.1"
        GENERATE_INFOPLIST_FILE: NO

  # -----------------------------------------------------------------------
  # SetmarkWatch — watchOS companion
  # -----------------------------------------------------------------------
  WorkoutDBWatch:
    type: application
    platform: watchOS
    sources:
      - path: WorkoutDBWatch
        excludes:
          - Info.plist
    dependencies:
      # Watch imports Core/* directly (HS-7: no duplicated logic on the
      # watch). No Sync — the watch talks to the phone via WatchConnectivity,
      # phone is the sole server-facing client.
      - package: WorkoutCoreFoundation
      - package: CoreDomain
      - package: CorePrescription
      - package: CoreAutoreg
      - package: CoreSession
      - package: DesignSystem
      # Persistence — watch persists local session state too.
      - package: Persistence
      # HealthKitBridge — owns HealthKit live workout probes and future
      # typed metric sourcing for watch metric consumers.
      - package: HealthKitBridge
      # WatchBridge — IPC back to the phone. Watch-side consumer talks to
      # the same protocol the phone talks to; direction is in the message.
      - package: WatchBridge
      # WorkoutKitAdapter — watchOS-only openInWorkoutApp proof path. Kept
      # separate from WatchBridge because this is WorkoutKit, not IPC.
      - package: WorkoutKitAdapter
      # FeaturesWatchFaces — watch companion UI (Idle / ActiveSet / Rest
      # faces + view model). The watch target stays a thin shell; faces
      # and wiring live in the Features package.
      - package: FeaturesWatchFaces
    info:
      path: WorkoutDBWatch/Info.plist
      properties:
        CFBundleDisplayName: Setmark
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ericfeunekes.WorkoutDB
        WKWatchOnly: NO     # companion to the iOS app
        NSHealthShareUsageDescription: "Reads live workout metrics from Apple Health for workout capture."
        NSHealthUpdateUsageDescription: "Writes completed workout probe data to Apple Health."
    entitlements:
      path: WorkoutDBWatch/WorkoutDBWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericfeunekes.WorkoutDB.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"     # watch
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        CURRENT_PROJECT_VERSION: "1"

  # -----------------------------------------------------------------------
  # DEBUG-only UI probe target for system HealthKit authorization sheets.
  # -----------------------------------------------------------------------
  WorkoutDBUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WorkoutDBUITests
    dependencies:
      - target: WorkoutDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericfeunekes.WorkoutDBUITests
        TEST_TARGET_NAME: WorkoutDB
        MARKETING_VERSION: "0.0.1"
        GENERATE_INFOPLIST_FILE: YES

  # -----------------------------------------------------------------------
  # Setmark — iOS app smoke tests
  # -----------------------------------------------------------------------
  WorkoutDBTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WorkoutDBTests
    dependencies:
      - target: WorkoutDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericfeunekes.WorkoutDBTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  WorkoutDB:
    build:
      targets:
        WorkoutDB: all
        WorkoutDBWatch: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WorkoutDBTests
        - WorkoutDBUITests
    archive:
      config: Release
