[tool.coverage.run]
branch = true
source = ["src"]
omit = [
  "*/tests/*",
  "*/migrations/*",
  "*_pb2.py",
]

[tool.coverage.report]
fail_under = 60
exclude_lines = [
  "pragma: no cover",
  "def __repr__",
  "if TYPE_CHECKING:",
  "raise AssertionError",
  "raise NotImplementedError",
  "if __name__ == ['\\\"]__main__['\\\"]:",
]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests", "examples"]
xfail_strict = true
