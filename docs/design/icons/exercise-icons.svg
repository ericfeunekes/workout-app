<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560" role="img" aria-labelledby="title desc">
  <title id="title">Setmark exercise icon source sheet</title>
  <desc id="desc">A token-aligned 24 by 24 SVG icon system rendered at multiple review sizes.</desc>
  <defs>
    <style>
      text { font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; fill: #c2bcae; font-size: 12px; }
      .title { fill: #f5f1e8; font-size: 18px; }
      .tile { fill: #1a1815; stroke: #36322b; }
      .i { fill: none; stroke: #f5f1e8; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .a { fill: none; stroke: #d28766; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .ok { fill: none; stroke: #6bb896; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .warn { fill: none; stroke: #d6a23a; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 1.4; }
    </style>

    <symbol id="strength" viewBox="0 0 24 24">
      <path class="i" d="M5 15h14M7 10h10M8 7v10M16 7v10"/>
      <path class="a" d="M10 5h4"/>
    </symbol>
    <symbol id="conditioning" viewBox="0 0 24 24">
      <path class="i" d="M5 14c0-4 3-7 7-7s7 3 7 7"/>
      <path class="a" d="M12 7v7l4 2"/>
      <path class="i thin" d="M6 18h12"/>
    </symbol>
    <symbol id="run" viewBox="0 0 24 24">
      <circle class="i" cx="14.5" cy="5" r="1.7"/>
      <path class="i" d="M13 8l-3 4 3 2 2-3"/>
      <path class="a" d="M9 12l-3 1M13 14l-2 5M15 11l4 2"/>
    </symbol>
    <symbol id="warm-up" viewBox="0 0 24 24">
      <path class="i" d="M7 17c0-4 5-5 5-10 3 3 5 6 5 10a5 5 0 0 1-10 0Z"/>
      <path class="a" d="M12 19c-1.4-.8-2-1.8-2-3.1 0-1.4 1.1-2.3 2-3.4 1.1 1.4 2 2.5 2 3.9 0 1.1-.6 2-2 2.6Z"/>
    </symbol>
    <symbol id="rest" viewBox="0 0 24 24">
      <path class="i" d="M8 6v12M16 6v12"/>
      <path class="a" d="M10 19h6"/>
    </symbol>
    <symbol id="timer" viewBox="0 0 24 24">
      <circle class="i" cx="12" cy="13" r="7"/>
      <path class="i" d="M10 3h4M12 6v2"/>
      <path class="a" d="M12 13l4-3"/>
    </symbol>
    <symbol id="bodyweight" viewBox="0 0 24 24">
      <circle class="i" cx="12" cy="5" r="2"/>
      <path class="i" d="M7 10h10M12 7v7"/>
      <path class="a" d="M8 19l4-5 4 5"/>
    </symbol>
    <symbol id="dumbbell" viewBox="0 0 24 24">
      <path class="i" d="M7 12h10"/>
      <path class="a" d="M4 9v6M7 9v6M17 9v6M20 9v6"/>
    </symbol>
    <symbol id="barbell" viewBox="0 0 24 24">
      <path class="i" d="M3 12h18"/>
      <path class="a" d="M5 8v8M8 7v10M16 7v10M19 8v8"/>
    </symbol>
    <symbol id="kettlebell" viewBox="0 0 24 24">
      <path class="i" d="M8 10c0-4 8-4 8 0"/>
      <path class="i" d="M7 11h10l1 7H6l1-7Z"/>
      <path class="a" d="M10 11v-1c0-2 4-2 4 0v1"/>
    </symbol>
    <symbol id="row" viewBox="0 0 24 24">
      <path class="i" d="M5 17h14M8 14l4-6 4 6"/>
      <path class="a" d="M8 10l-4 2M16 10l4 2"/>
    </symbol>
    <symbol id="bike" viewBox="0 0 24 24">
      <circle class="i" cx="6.5" cy="16" r="3"/>
      <circle class="i" cx="17.5" cy="16" r="3"/>
      <path class="a" d="M6.5 16l4.5-7 3.5 7h-8M11 9h4"/>
    </symbol>
    <symbol id="mobility" viewBox="0 0 24 24">
      <path class="i" d="M6 17c3-6 9-6 12 0"/>
      <path class="a" d="M7 9c2 2 4 3 5 8M17 9c-2 2-4 3-5 8"/>
      <path class="i thin" d="M9 6h6"/>
    </symbol>
    <symbol id="bench-press" viewBox="0 0 24 24">
      <path class="i" d="M5 15h10M7 18h10M8 15l-2 3M15 15l2 3"/>
      <path class="a" d="M6 9h12M5 7v4M19 7v4"/>
      <path class="i thin" d="M9 13l4-2"/>
    </symbol>
    <symbol id="incline-bench-press" viewBox="0 0 24 24">
      <path class="i" d="M6 18h12M8 16l7-6M7 18l1-2M16 10l2 8"/>
      <path class="a" d="M8 8l8-2M7 6v4M17 4v4"/>
      <path class="i thin" d="M11 13l3-2"/>
    </symbol>
  </defs>

  <rect width="1160" height="560" fill="#0f0e0c"/>
  <text x="32" y="42" class="title">Setmark icon source sheet</text>
  <text x="32" y="66">Each symbol is a 24x24 master. Rows show 48, 32, 24, and 20 px review sizes.</text>

  <g transform="translate(32 96)">
    <g id="sheet">
      <g transform="translate(0 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#strength" x="28" y="20" width="48" height="48"/>
        <text x="14" y="88">strength</text>
      </g>
      <g transform="translate(128 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#conditioning" x="28" y="20" width="48" height="48"/>
        <text x="5" y="88">conditioning</text>
      </g>
      <g transform="translate(256 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#run" x="28" y="20" width="48" height="48"/>
        <text x="40" y="88">run</text>
      </g>
      <g transform="translate(384 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#warm-up" x="28" y="20" width="48" height="48"/>
        <text x="25" y="88">warm-up</text>
      </g>
      <g transform="translate(512 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#rest" x="28" y="20" width="48" height="48"/>
        <text x="38" y="88">rest</text>
      </g>
      <g transform="translate(640 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#timer" x="28" y="20" width="48" height="48"/>
        <text x="34" y="88">timer</text>
      </g>
      <g transform="translate(768 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#bodyweight" x="28" y="20" width="48" height="48"/>
        <text x="17" y="88">bodyweight</text>
      </g>
      <g transform="translate(896 0)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#dumbbell" x="28" y="20" width="48" height="48"/>
        <text x="23" y="88">dumbbell</text>
      </g>

      <g transform="translate(0 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#barbell" x="28" y="20" width="48" height="48"/>
        <text x="27" y="88">barbell</text>
      </g>
      <g transform="translate(128 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#kettlebell" x="28" y="20" width="48" height="48"/>
        <text x="20" y="88">kettlebell</text>
      </g>
      <g transform="translate(256 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#row" x="28" y="20" width="48" height="48"/>
        <text x="40" y="88">row</text>
      </g>
      <g transform="translate(384 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#bike" x="28" y="20" width="48" height="48"/>
        <text x="36" y="88">bike</text>
      </g>
      <g transform="translate(512 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#mobility" x="28" y="20" width="48" height="48"/>
        <text x="23" y="88">mobility</text>
      </g>
      <g transform="translate(640 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#bench-press" x="28" y="20" width="48" height="48"/>
        <text x="17" y="88">bench flat</text>
      </g>
      <g transform="translate(768 128)">
        <rect class="tile" width="104" height="104" rx="18"/>
        <use href="#incline-bench-press" x="28" y="20" width="48" height="48"/>
        <text x="11" y="88">bench incline</text>
      </g>
    </g>
  </g>

  <g transform="translate(32 390)">
    <text x="0" y="0">Size proof</text>
    <g transform="translate(0 18)">
      <use href="#dumbbell" x="0" y="0" width="48" height="48"/>
      <use href="#dumbbell" x="70" y="8" width="32" height="32"/>
      <use href="#dumbbell" x="124" y="12" width="24" height="24"/>
      <use href="#dumbbell" x="170" y="14" width="20" height="20"/>
      <text x="210" y="29">dumbbell</text>
    </g>
    <g transform="translate(360 18)">
      <use href="#bench-press" x="0" y="0" width="48" height="48"/>
      <use href="#bench-press" x="70" y="8" width="32" height="32"/>
      <use href="#bench-press" x="124" y="12" width="24" height="24"/>
      <use href="#bench-press" x="170" y="14" width="20" height="20"/>
      <text x="210" y="29">flat bench</text>
    </g>
    <g transform="translate(720 18)">
      <use href="#incline-bench-press" x="0" y="0" width="48" height="48"/>
      <use href="#incline-bench-press" x="70" y="8" width="32" height="32"/>
      <use href="#incline-bench-press" x="124" y="12" width="24" height="24"/>
      <use href="#incline-bench-press" x="170" y="14" width="20" height="20"/>
      <text x="210" y="29">incline bench</text>
    </g>
  </g>
</svg>
